description = "Quick reference for carmy modes, skills, and commands"
prompt = "Show the carmy quick reference. One shot, change nothing: do not switch mode, write flag files, or persist anything. Modes: /carmy cold or :cold (minimal, technical, optimal — default), /carmy hot or :hot (beginner-facing — one short funny analogy, then same tight fix), /carmy off (disable session), /carmy default cold|hot (persist startup default), /carmy with no argument (report current mode). Commands: /carmy (workflow), /carmy-review (workflow review), /carmy-tdd (self-contained RED-GREEN protocol), /carmy-help (this card). Codex uses $carmy, $carmy-review, $carmy-tdd, $carmy-help. Deactivate with 'stop carmy' or 'normal mode'. Default mode is cold; set CARMY_DEFAULT_MODE to cold|hot or ~/.config/carmy/config.json (Windows: %APPDATA%\\carmy\\config.json) to {\"defaultMode\": \"hot\"}. Resolution: env, config, cold."
