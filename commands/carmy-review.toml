description = "Review changes against the carmy workflow gates"
prompt = "Review the current code changes against the carmy workflow only, not correctness. One line per finding: L<line>: <tag> <what>. <fix>. Tags: reuse (reinvents a repo/stdlib/native/installed-dependency helper — name it), root (patches a symptom or one caller while a sibling stays broken — name the shared function), scope (touches code the task did not require — rename, reformat, reorder, unrelated cleanup, comment churn — revert it), test (reproducible-bug fix with no RED->GREEN regression test — name the behavior), yagni (unrequested abstraction, scaffolding, dependency, or future-proofing — delete it), attribution (an AI, model, tool, or brand name in a commit message, PR, branch, or comment — strip it). End with the gate summary. If nothing breaks a gate: 'Gates pass. Ship.' List the fixes; do not apply them."
