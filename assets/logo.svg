<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="carmy">
  <defs>
    <linearGradient id="cy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b6cb0"/>
      <stop offset="1" stop-color="#7a1f1f"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="#111111"/>
