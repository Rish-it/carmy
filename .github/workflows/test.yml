name: test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Check version consistency
        run: node scripts/version.js --check

      - name: Check instruction invariants
        run: node scripts/check-invariants.js

      - name: Check lineage
        run: node scripts/check-lineage.js --history

      - name: Run tests
        run: npm test
